name: blood_connect
description: BloodConnect - Connecting Blood Donors with Those in Need
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.1.0

  # Navigation
  go_router: ^12.0.0

  # HTTP Client
  dio: ^5.3.0

  # Local Storage
  flutter_secure_storage: ^9.0.0

  # Freezed & Serialization
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0

  # UI & Design
  google_fonts: ^6.1.0
  flutter_screenutil: ^5.9.0
  flutter_svg: ^2.0.0
  gap: ^3.0.0
  iconsax: ^0.0.8

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  logger: ^2.1.0
  connectivity_plus: ^5.0.0
  pretty_dio_logger: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
